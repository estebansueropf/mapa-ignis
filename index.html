<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IGNIS AI — Predicción Geográfica de Incendios</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.3/mapbox-gl-geocoder.css" type="text/css">
  </head>
  <body>
    <div id="map"></div>
    
    <!-- Top Left Search Area -->
    <div id="top-left-controls">
      <a href="/" id="brand" aria-label="IGNIS AI">
        <img src="/logo.png" alt="IGNIS AI" />
      </a>
      <button id="target-btn" class="icon-btn" aria-label="Target Location">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
      <button id="back-btn" class="icon-btn hidden" aria-label="Volver a la vista anterior" title="Volver a la vista anterior">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </button>
      <div id="geocoder-container"></div>
    </div>

    <!-- Toggle to reopen the right panel -->
    <button id="open-panel-btn" class="icon-btn hidden" aria-label="Abrir panel" title="Abrir panel">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>

    <!-- Centered Tooltip -->
    <div id="map-tooltip">Haz clic en el mapa para seleccionar una ubicación</div>

    <!-- Right Side Panel -->
    <div id="prediction-panel" class="side-panel">
      <div class="panel-header">
        <div class="panel-title-area">
          <h2>Panel de Predicción de Riesgo de Incendios</h2>
          <p class="subtitle">Paneles de predicción de riesgo de incendios</p>
          <p class="header-coords" id="header-coords">--º N, --º W</p>
        </div>
        <button class="close-btn" id="close-panel-btn">✕</button>
      </div>

      <div class="input-group">
        <label>Coordenadas</label>
        <input type="text" id="coords-input" value="" placeholder="Ej: 40.4168° N, 3.7838° W" readonly />
      </div>

      <div class="input-group">
        <label>Fecha</label>
        <input type="date" id="date-input" />
      </div>

      <div class="tabs-section">
        <label>Tipo de predicción de incendios</label>
        <div class="tabs-container">
          <button class="tab-btn active" id="tab-riesgo">
            <span class="tab-icon">🔥</span>
            <span>Predicción de Riesgo</span>
          </button>
          <button class="tab-btn" id="tab-frp">
            <span class="tab-icon">⚡</span>
            <span>Predicción de FRP</span>
          </button>
        </div>
      </div>

      <div id="results-container">
        <!-- Results injected here by JS -->
      </div>

      <div class="action-section">
        <button id="action-btn" class="primary-btn">Generar predicción</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
